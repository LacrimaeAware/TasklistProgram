<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#5b6cf0" />
  <title>Tiny Tasklist</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <link rel="apple-touch-icon" href="assets/icon.png" />
  <!-- Set theme before first paint (no flash): saved choice, else system preference. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("tt_theme");
        var sysDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", saved || (sysDark ? "dark" : "light"));
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img src="assets/icon.png" alt="logo" />
        <h1>Tiny Tasklist</h1>
      </div>

      <div class="nav-section">Views</div>
      <div id="views"></div>

      <div class="nav-section">Groups</div>
      <div id="groups"></div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button class="icon-btn menu-btn" id="menuBtn" title="Menu">☰</button>
        <div>
          <h2 id="viewTitle">Today</h2>
          <div class="sub" id="viewSub"></div>
        </div>
        <div class="spacer"></div>
        <div class="search">
          <span class="mag">🔍</span>
          <input id="search" type="text" placeholder="Search tasks…" />
        </div>
        <button class="btn primary" id="addBtn">+ Add task</button>
        <button class="icon-btn" id="themeBtn" title="Toggle theme">🌙</button>
      </header>

      <div class="content" id="content"></div>
    </main>
  </div>

  <!-- Add-task modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h3>Add a task</h3>
      <div class="field">
        <label>Title</label>
        <input id="m_title" type="text" placeholder="e.g. Finish lab report" />
      </div>
      <div class="row2">
        <div class="field">
          <label>Due</label>
          <input id="m_due" type="text" placeholder="today, tomorrow, +2d…" />
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="m_prio">
            <option value="H">High</option>
            <option value="M" selected>Medium</option>
            <option value="L">Low</option>
            <option value="D">Daily</option>
            <option value="X">Misc</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Repeat</label>
          <select id="m_repeat">
            <option value="none" selected>None</option>
            <option value="daily">Daily</option>
            <option value="weekdays">Weekdays</option>
            <option value="weekly">Weekly</option>
            <option value="bi-weekly">Bi-weekly</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>
        <div class="field">
          <label>Group</label>
          <input id="m_group" type="text" placeholder="e.g. School" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="m_cancel">Cancel</button>
        <button class="btn primary" id="m_save">Add task</button>
      </div>
    </div>
  </div>

  <script src="sample-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
